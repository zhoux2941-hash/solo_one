# 服务器配置
server.port=8080

# 应用名称
spring.application.name=log-analysis-system

# 数据源配置 (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/log_analysis?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Elasticsearch 配置
spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.username=elastic
spring.elasticsearch.password=changeme

# 文件上传配置
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB

# 流式处理配置
# 大文件阈值（字节），超过此大小使用流式处理
log.upload.large-file-threshold=10485760
# 流式处理批量大小，每批处理的日志行数
log.upload.batch-size=1000

# 日志配置
logging.level.com.loganalysis=DEBUG
logging.level.org.springframework.data.elasticsearch.client.WIRE=TRACE

# 异常检测配置
# 是否启用异常检测
anomaly.detection.enabled=true
# 检测间隔（毫秒）
anomaly.detection.interval-ms=60000
# 滑动窗口大小（分钟）
anomaly.detection.window-minutes=30
# 报警阈值（标准差倍数）
anomaly.detection.threshold-sigma=2.0
# 最小历史数据点数
anomaly.detection.min-history-points=5

# 异常报警配置
# 是否启用报警
anomaly.alert.enabled=true
# 报警冷却时间（分钟）
anomaly.alert.cooldown-minutes=10

# 钉钉 Webhook 配置
# 钉钉机器人 Webhook URL（必填，如 https://oapi.dingtalk.com/robot/send?access_token=xxx）
dingtalk.webhook.url=
# 钉钉机器人密钥（可选，用于签名验证）
dingtalk.webhook.secret=
# 是否启用钉钉报警
dingtalk.alert.enabled=false
# 需要@的手机号（逗号分隔）
dingtalk.alert.at-mobiles=
# 是否@所有人
dingtalk.alert.at-all=false

# 定时任务配置
spring.task.scheduling.pool.size=2
