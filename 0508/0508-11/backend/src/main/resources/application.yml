server:
  port: 8080

spring:
  application:
    name: restaurant-queue-system

  datasource:
    url: jdbc:mysql://localhost:3306/restaurant_queue?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

restaurant:
  queue:
    table-config:
      small:
        count: 5
        capacity: 2
      medium:
        count: 3
        capacity: 4
