<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代码片段管理器</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="node_modules/codemirror/lib/codemirror.css">
  <link rel="stylesheet" href="node_modules/codemirror/theme/material-darker.css">
  <link rel="stylesheet" href="node_modules/codemirror/addon/fold/foldgutter.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>代码片段</h1>
        <button class="btn btn-primary" id="newSnippetBtn">+ 新建片段</button>
      </div>
      
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="搜索代码片段...">
        <button id="clearSearchBtn" style="display:none;">✕</button>
      </div>
      
      <div class="tags-section">
        <h3>标签筛选</h3>
        <div id="tagsList" class="tags-list"></div>
        <button class="btn btn-link" id="clearTagFilter" style="display:none;">清除标签筛选</button>
      </div>
      
      <div class="snippet-list" id="snippetList"></div>
    </aside>
    
    <main class="main-content">
      <div id="editorContainer" class="editor-container" style="display:none;">
        <div class="editor-header">
          <input type="text" id="titleInput" class="title-input" placeholder="输入片段标题...">
          
          <div class="editor-actions">
            <div class="language-selector">
              <select id="languageSelect">
                <option value="javascript">JavaScript</option>
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="cpp">C++</option>
                <option value="c">C</option>
                <option value="csharp">C#</option>
                <option value="typescript">TypeScript</option>
                <option value="php">PHP</option>
                <option value="ruby">Ruby</option>
                <option value="go">Go</option>
                <option value="rust">Rust</option>
                <option value="sql">SQL</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="xml">XML</option>
                <option value="json">JSON</option>
                <option value="yaml">YAML</option>
                <option value="markdown">Markdown</option>
                <option value="shell">Shell</option>
              </select>
            </div>
            
            <div class="tags-input">
              <div id="selectedTags" class="selected-tags"></div>
              <input type="text" id="tagInput" placeholder="添加标签 (回车确认)">
            </div>
            
            <div class="action-buttons">
              <button class="btn btn-run" id="runBtn" title="运行代码 (仅支持 JavaScript/Python)">▶️ 运行</button>
              <button class="btn btn-success" id="copyBtn" title="复制到剪贴板">📋 复制</button>
              <button class="btn btn-secondary" id="saveBtn" title="保存">💾 保存</button>
              <button class="btn btn-danger" id="deleteBtn" title="删除" style="display:none;">🗑 删除</button>
              <button class="btn btn-link" id="cancelBtn" title="取消" style="display:none;">取消</button>
            </div>
          </div>
        </div>
        
        <div class="editor-main-area">
          <div class="code-editor-wrapper">
            <textarea id="codeEditor"></textarea>
          </div>
          
          <div class="output-panel" id="outputPanel" style="display:none;">
            <div class="output-header">
              <span class="output-title">输出结果</span>
              <div class="output-actions">
                <span id="runStatus" class="run-status"></span>
                <button class="btn btn-link" id="clearOutputBtn">清除</button>
                <button class="btn btn-link" id="toggleOutputBtn">收起</button>
              </div>
            </div>
            <div class="output-content" id="outputContent"></div>
          </div>
        </div>
        
        <div class="status-bar">
          <span id="statusMessage"></span>
        </div>
      </div>
      
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">📝</div>
        <h2>暂无代码片段</h2>
        <p>点击左侧的"新建片段"按钮开始创建你的第一个代码片段</p>
      </div>
    </main>
  </div>
  
  <script src="node_modules/codemirror/lib/codemirror.js"></script>
  <script src="node_modules/codemirror/mode/javascript/javascript.js"></script>
  <script src="node_modules/codemirror/mode/python/python.js"></script>
  <script src="node_modules/codemirror/mode/clike/clike.js"></script>
  <script src="node_modules/codemirror/mode/php/php.js"></script>
  <script src="node_modules/codemirror/mode/ruby/ruby.js"></script>
  <script src="node_modules/codemirror/mode/go/go.js"></script>
  <script src="node_modules/codemirror/mode/rust/rust.js"></script>
  <script src="node_modules/codemirror/mode/sql/sql.js"></script>
  <script src="node_modules/codemirror/mode/xml/xml.js"></script>
  <script src="node_modules/codemirror/mode/css/css.js"></script>
  <script src="node_modules/codemirror/mode/yaml/yaml.js"></script>
  <script src="node_modules/codemirror/mode/markdown/markdown.js"></script>
  <script src="node_modules/codemirror/mode/shell/shell.js"></script>
  
  <script src="node_modules/codemirror/addon/fold/foldcode.js"></script>
  <script src="node_modules/codemirror/addon/fold/foldgutter.js"></script>
  <script src="node_modules/codemirror/addon/fold/brace-fold.js"></script>
  <script src="node_modules/codemirror/addon/fold/comment-fold.js"></script>
  <script src="node_modules/codemirror/addon/fold/indent-fold.js"></script>
  <script src="node_modules/codemirror/addon/fold/xml-fold.js"></script>
  <script src="node_modules/codemirror/addon/edit/closebrackets.js"></script>
  <script src="node_modules/codemirror/addon/selection/active-line.js"></script>
  <script src="node_modules/codemirror/addon/search/search.js"></script>
  <script src="node_modules/codemirror/addon/search/searchcursor.js"></script>
  <script src="node_modules/codemirror/addon/search/match-highlighter.js"></script>
  
  <script src="renderer.js"></script>
</body>
</html>
