server:
  port: 8080

spring:
  application:
    name: seat-booking-system

  datasource:
    url: jdbc:mysql://localhost:3306/seat_booking?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        defer-datasource-initialization: true
  
  sql:
    init:
      mode: always
      continue-on-error: true

  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
