server:
  port: 8080

spring:
  application:
    name: telescope-booking

  datasource:
    url: jdbc:mysql://localhost:3306/astro_booking?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  observatory:
    latitude: 30.0
    longitude: 120.0
    elevation: 50.0
  booking:
    start-hour: 19
    end-hour: 23
    slot-minutes: 30
    horizon-elevation: 15.0
  cache:
    days-ahead: 7
