<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体检报告详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #2c3e50;
            font-size: 28px;
        }
        .back-btn {
            display: inline-block;
            padding: 10px 25px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            margin-bottom: 20px;
        }
        .report-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .report-header {
            border-bottom: 2px solid #667eea;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .report-header h2 {
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .report-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .report-info p {
            color: #666;
        }
        .report-info strong {
            color: #333;
        }
        .abnormal-warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px 20px;
            margin-bottom: 25px;
            border-radius: 5px;
        }
        .abnormal-warning h4 {
            color: #856404;
            margin-bottom: 5px;
        }
        .section-title {
            color: #2c3e50;
            font-size: 20px;
            margin: 25px 0 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .indicator-table {
            width: 100%;
            border-collapse: collapse;
        }
        .indicator-table th,
        .indicator-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .indicator-table th {
            background: #f8f9fa;
            color: #666;
            font-weight: 500;
        }
        .indicator-abnormal {
            background: #ffebee;
        }
        .indicator-abnormal td {
            color: #c62828;
        }
        .abnormal-tag {
            display: inline-block;
            padding: 2px 10px;
            background: #f44336;
            color: white;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 10px;
        }
        .doctor-notes {
            background: #e8f5e9;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .doctor-notes h4 {
            color: #2e7d32;
            margin-bottom: 10px;
        }
        .doctor-notes p {
            color: #4caf50;
            line-height: 1.6;
        }
        .file-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 10px;
            text-align: center;
            color: #1976d2;
            text-decoration: none;
            margin: 20px 0;
            transition: all 0.3s;
        }
        .file-link:hover {
            background: #bbdefb;
        }
        .file-link .icon {
            font-size: 24px;
        }
        .file-link.word {
            background: #e8f5e9;
            color: #388e3c;
        }
        .file-link.word:hover {
            background: #c8e6c9;
        }
        .preview-container {
            margin: 20px 0;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }
        .preview-container iframe {
            width: 100%;
            height: 600px;
            border: none;
        }
        .preview-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .preview-toggle:hover {
            background: #e0e0e0;
        }
        .word-preview {
            padding: 40px;
            text-align: center;
            background: #f8f9fa;
        }
        .word-preview .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .word-preview p {
            color: #666;
            margin-bottom: 15px;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .recheck-btn {
            flex: 1;
            padding: 15px;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .recheck-btn:hover {
            background: #f57c00;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        .no-report {
            text-align: center;
            padding: 50px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <div class="header">
            <h1>📄 体检报告详情</h1>
        </div>
        <div class="report-card" id="reportContent">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        
        async function loadReport() {
            const params = new URLSearchParams(window.location.search);
            const reservationId = params.get('id');
            
            if (!reservationId) {
                document.getElementById('reportContent').innerHTML = `
                    <div class="no-report">
                        <p>参数错误，请从预约列表进入</p>
                    </div>
                `;
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/reports/reservation/${reservationId}`);
                
                if (!response.ok) {
                    document.getElementById('reportContent').innerHTML = `
                        <div class="no-report">
                            <h3>报告尚未生成</h3>
                            <p>请等待医生上传报告</p>
                        </div>
                    `;
                    return;
                }
                
                const report = await response.json();
                renderReport(report);
            } catch (error) {
                console.error('加载报告失败:', error);
                document.getElementById('reportContent').innerHTML = `
                    <div class="no-report">
                        <p>加载失败，请重试</p>
                    </div>
                `;
            }
        }
        
        function renderReport(report) {
            let indicatorsHtml = report.indicators.map(ind => `
                <tr class="${ind.isAbnormal ? 'indicator-abnormal' : ''}">
                    <td>${ind.name}</td>
                    <td>${ind.value} ${ind.unit || ''} ${ind.isAbnormal ? '<span class="abnormal-tag">异常</span>' : ''}</td>
                    <td>${ind.referenceRange || '-'}</td>
                </tr>
            `).join('');
            
            let warningHtml = '';
            if (report.hasAbnormal) {
                warningHtml = `
                    <div class="abnormal-warning">
                        <h4>⚠️ 健康提醒</h4>
                        <p>您的体检报告中有异常指标，建议咨询医生或申请复查</p>
                    </div>
                `;
            }
            
            let fileHtml = '';
            let previewHtml = '';
            if (report.pdfUrl) {
                const fileType = report.fileType || 'PDF';
                const fileName = report.fileName || '体检报告.' + fileType.toLowerCase();
                const icon = fileType === 'PDF' ? '📕' : '📘';
                const isWord = fileType === 'WORD';
                
                fileHtml = `
                    <a href="${report.pdfUrl}" class="file-link ${isWord ? 'word' : ''}" target="_blank">
                        <span class="icon">${icon}</span>
                        <span>点击查看完整${fileType}报告 - ${fileName}</span>
                        <span style="font-size: 12px; opacity: 0.7;">↗ 新窗口打开</span>
                    </a>
                `;
                
                if (fileType === 'PDF') {
                    previewHtml = `
                        <button class="preview-toggle" onclick="togglePreview(this)">
                            <span>📑 展开在线预览</span>
                            <span>▼</span>
                        </button>
                        <div class="preview-container" style="display: none;">
                            <iframe src="${report.pdfUrl}" title="PDF预览"></iframe>
                        </div>
                    `;
                } else if (fileType === 'WORD') {
                    previewHtml = `
                        <div class="preview-container">
                            <div class="word-preview">
                                <div class="icon">📘</div>
                                <p>Word 文档预览</p>
                                <p style="font-size: 14px;">点击上方链接下载查看完整报告</p>
                            </div>
                        </div>
                    `;
                }
            }
            
            let notesHtml = '';
            if (report.doctorNotes) {
                notesHtml = `
                    <div class="doctor-notes">
                        <h4>👨‍⚕️ 医生建议</h4>
                        <p>${report.doctorNotes}</p>
                    </div>
                `;
            }
            
            document.getElementById('reportContent').innerHTML = `
                <div class="report-header">
                    <h2>健康体检报告</h2>
                    <div class="report-info">
                        <p><strong>姓名：</strong>${report.userName}</p>
                        <p><strong>手机号：</strong>${report.phone}</p>
                        <p><strong>报告日期：</strong>${new Date(report.createdAt).toLocaleDateString()}</p>
                        <p><strong>报告编号：</strong>RPT-${report.id}</p>
                    </div>
                </div>
                
                ${warningHtml}
                ${fileHtml}
                ${previewHtml}
                
                <h3 class="section-title">📊 体检指标</h3>
                <table class="indicator-table">
                    <thead>
                        <tr>
                            <th>检查项目</th>
                            <th>检测结果</th>
                            <th>参考范围</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${indicatorsHtml}
                    </tbody>
                </table>
                
                ${notesHtml}
                
                <div class="action-buttons">
                    <button class="recheck-btn" onclick="requestRecheck(${report.id})">
                        📋 申请报告复查
                    </button>
                </div>
            `;
        }
        
        function togglePreview(btn) {
            const container = btn.nextElementSibling;
            const isVisible = container.style.display !== 'none';
            
            if (isVisible) {
                container.style.display = 'none';
                btn.querySelector('span:first-child').textContent = '📑 展开在线预览';
                btn.querySelector('span:last-child').textContent = '▼';
            } else {
                container.style.display = 'block';
                btn.querySelector('span:first-child').textContent = '📑 收起在线预览';
                btn.querySelector('span:last-child').textContent = '▲';
            }
        }
        
        async function requestRecheck(reportId) {
            if (!confirm('确定要申请报告复查吗？')) return;
            
            try {
                const response = await fetch(`${API_BASE}/reports/${reportId}/recheck`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    alert('复查申请已提交，我们将尽快安排医生复核！');
                } else {
                    alert('申请失败，请重试');
                }
            } catch (error) {
                console.error('申请复查失败:', error);
                alert('申请失败，请重试');
            }
        }
        
        loadReport();
    </script>
</body>
</html>
