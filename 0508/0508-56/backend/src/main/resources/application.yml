server:
  port: 8080

spring:
  application:
    name: lane-matcher

  datasource:
    url: jdbc:mysql://localhost:3306/swimming_lane?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

logging:
  level:
    com.swimming: DEBUG
    org.hibernate.SQL: DEBUG

swimming:
  lanes:
    - id: 1
      name: 泳道1 - 快速
      minSpeed: 0
      maxSpeed: 1.0
    - id: 2
      name: 泳道2 - 中速
      minSpeed: 1.0
      maxSpeed: 1.5
    - id: 3
      name: 泳道3 - 中速
      minSpeed: 1.0
      maxSpeed: 1.5
    - id: 4
      name: 泳道4 - 慢速
      minSpeed: 1.5
      maxSpeed: 99.0