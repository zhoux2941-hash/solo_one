server:
  port: 8080

spring:
  application:
    name: pet-boarding-backend

  datasource:
    url: jdbc:mysql://localhost:3306/pet_boarding?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: petboarding_secret_key_2024_very_long_key_for_security
  expiration: 86400000

logging:
  level:
    com.petboarding: DEBUG
    org.hibernate.SQL: DEBUG
