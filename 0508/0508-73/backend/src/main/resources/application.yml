server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/chemical_management?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

app:
  approval:
    deadline: 24
  stock:
    threshold: 100
