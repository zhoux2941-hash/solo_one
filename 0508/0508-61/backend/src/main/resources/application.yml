spring:
  application:
    name: express-station
  datasource:
    url: jdbc:mysql://localhost:3306/express_station?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000ms

server:
  port: 8080

station:
  config:
    rows: 3
    columns: 10
    cell-capacity: 0.1

logging:
  level:
    com.express.station: debug
