server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/aquarium_ph?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  sql:
    init:
      mode: always

app:
  ph:
    min: 7.8
    max: 8.4
  tanks:
    - 珊瑚缸
    - 鲨鱼缸
    - 热带鱼缸
    - 水母缸
    - 海龟缸
    - 企鹅缸
    - 海獭缸
    - 巨藻缸
