server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/water_monitor?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000ms

app:
  low-water-threshold: 5
  max-water-capacity: 20
  prediction-hours: 2
