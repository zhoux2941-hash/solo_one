server:
  port: 8080

spring:
  application:
    name: bike-sharing-platform

  datasource:
    url: jdbc:mysql://localhost:3306/bike_sharing?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai

scheduling:
  enabled: true

logging:
  level:
    com.bikesharing: DEBUG
    org.springframework.data.redis: INFO
