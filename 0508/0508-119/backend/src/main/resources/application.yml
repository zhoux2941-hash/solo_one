server:
  port: 8080

spring:
  application:
    name: charging-pile-system
  
  datasource:
    url: jdbc:mysql://localhost:3306/charging_pile_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: chargingPileSystemSecretKeyForJwtTokenGenerationAndVerification2024
  expiration: 86400000

app:
  reservation:
    max-future-hours: 2
    slot-minutes: 30
    hold-minutes: 15
