spring:
  application:
    name: woodjoin-generator
  datasource:
    url: jdbc:mysql://localhost:3306/woodjoin?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms

server:
  port: 8080

logging:
  level:
    com.woodjoin: debug
    org.springframework.web: info