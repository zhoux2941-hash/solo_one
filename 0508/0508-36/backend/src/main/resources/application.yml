server:
  port: 8080

spring:
  application:
    name: wheelchair-wear-analyzer
  datasource:
    url: jdbc:mysql://localhost:3306/wheelchair_wear?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  sql:
    init:
      mode: always

logging:
  level:
    com.wheelchair: INFO
    org.hibernate.SQL: WARN
