server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bus_scheduling?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

app:
  scheduling:
    initial-energy: 100
    fatigue-threshold: 30
    driving-energy-cost-per-hour: 10
    rest-energy-recovery-per-30min: 5
