<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泳池水质监测与自动告警系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .nav-tab {
            padding: 10px 25px;
            border: none;
            background: #f0f0f0;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .nav-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .nav-tab:hover {
            transform: translateY(-2px);
        }

        .content {
            display: none;
        }

        .content.active {
            display: block;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .status-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .status-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }

        .status-card.warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .status-card.success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .status-card .value {
            font-size: 36px;
            font-weight: bold;
            margin: 10px 0;
        }

        .status-card .label {
            font-size: 14px;
            opacity: 0.9;
        }

        .status-card .standard {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
            padding: 6px 15px;
            font-size: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .badge-danger {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }

        .chart-container {
            height: 400px;
            margin-top: 20px;
        }

        .alert-item {
            background: #fff5f5;
            border-left: 4px solid #f56565;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 0 8px 8px 0;
        }

        .alert-item.handled {
            background: #f0fff4;
            border-left-color: #48bb78;
        }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .alert-time {
            font-size: 12px;
            color: #666;
        }

        .alert-content {
            color: #333;
            margin-bottom: 10px;
        }

        .alert-actions {
            display: flex;
            gap: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .report-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        .report-controls select,
        .report-controls input {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-item .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-item .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 2000;
            transform: translateX(400px);
            transition: transform 0.3s;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .toast.error {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏊 泳池水质监测与自动告警系统</h1>
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="switchTab('monitor')">实时监测</button>
                <button class="nav-tab" onclick="switchTab('input')">数据录入</button>
                <button class="nav-tab" onclick="switchTab('alerts')">告警管理</button>
                <button class="nav-tab" onclick="switchTab('reports')">报表统计</button>
            </div>
        </div>

        <div id="monitor" class="content active">
            <div class="card">
                <h2>📊 当前水质状态</h2>
                <div class="status-cards" id="currentStatus"></div>
            </div>

            <div class="card">
                <h2>📈 24小时水质趋势</h2>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h2>📋 最近监测记录</h2>
                <table>
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>余氯(mg/L)</th>
                            <th>PH值</th>
                            <th>浊度</th>
                            <th>水温(°C)</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="recentRecords"></tbody>
                </table>
            </div>
        </div>

        <div id="input" class="content">
            <div class="card">
                <h2>📝 水质数据录入</h2>
                <form id="dataForm" onsubmit="submitData(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label>余氯 (mg/L)</label>
                            <input type="number" step="0.01" id="residualChlorine" required placeholder="0.3-1.0">
                        </div>
                        <div class="form-group">
                            <label>PH值</label>
                            <input type="number" step="0.01" id="phValue" required placeholder="6.5-8.5">
                        </div>
                        <div class="form-group">
                            <label>浊度</label>
                            <input type="number" step="0.01" id="turbidity" required placeholder="≤1">
                        </div>
                        <div class="form-group">
                            <label>水温 (°C)</label>
                            <input type="number" step="0.1" id="waterTemperature" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>记录时间</label>
                        <input type="datetime-local" id="recordTime">
                    </div>
                    <button type="submit" class="btn btn-primary">提交数据</button>
                </form>
            </div>
        </div>

        <div id="alerts" class="content">
            <div class="card">
                <h2>⚠️ 告警统计</h2>
                <div class="stats-grid" id="alertStats"></div>
            </div>

            <div class="card">
                <h2>🔔 待处理告警</h2>
                <div id="unhandledAlerts"></div>
            </div>

            <div class="card">
                <h2>📜 所有告警记录</h2>
                <table>
                    <thead>
                        <tr>
                            <th>告警时间</th>
                            <th>告警类型</th>
                            <th>告警内容</th>
                            <th>级别</th>
                            <th>处理人</th>
                            <th>处理措施</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="allAlerts"></tbody>
                </table>
            </div>
        </div>

        <div id="reports" class="content">
            <div class="card">
                <h2>📊 报表统计</h2>
                <div class="report-controls">
                    <select id="reportType" onchange="updateReport()">
                        <option value="daily">日报</option>
                        <option value="monthly">月报</option>
                    </select>
                    <input type="date" id="reportDate" onchange="updateReport()">
                </div>
                <div class="stats-grid" id="reportStats"></div>
                <div class="chart-container">
                    <canvas id="reportChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="handleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>处理告警</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form onsubmit="handleAlertSubmit(event)">
                <input type="hidden" id="alertId">
                <div class="form-group">
                    <label>处理人</label>
                    <input type="text" id="handler" required>
                </div>
                <div class="form-group">
                    <label>处理措施</label>
                    <input type="text" id="handleMeasure" required placeholder="如：添加消毒剂、换水等">
                </div>
                <button type="submit" class="btn btn-success">确认处理</button>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
