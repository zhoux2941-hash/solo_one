server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/quiz_competition?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  redis:
    host: localhost
    port: 6379
    timeout: 5000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

app:
  jwt:
    secret: quizCompetitionSecretKeyForJwtTokenGeneration2024
    expiration: 86400000
  host:
    username: host
    password: host123456

logging:
  level:
    com.quiz: DEBUG
    org.springframework.security: INFO
