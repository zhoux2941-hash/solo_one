<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交通违章管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚗 交通违章管理系统</h1>
        </header>

        <div id="loginSection" class="card">
            <h2>用户登录</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-primary">登录</button>
            </form>
            <div class="login-hint">
                <p><strong>测试账号：</strong></p>
                <p>交警: police / 123456</p>
                <p>车主张三: zhangsan / 123456 (车牌: 粤A12345)</p>
                <p>车主李四: lisi / 123456 (车牌: 粤B67890)</p>
            </div>
        </div>

        <div id="policeSection" class="hidden">
            <div class="user-info">
                <span id="policeName"></span>
                <button onclick="logout()" class="btn btn-secondary">退出登录</button>
            </div>
            
            <div class="card">
                <h2>📝 录入违章记录</h2>
                <form id="violationForm">
                    <div class="form-group">
                        <label>车牌号</label>
                        <input type="text" id="plateNumber" required placeholder="例如：粤A12345">
                    </div>
                    <div class="form-group">
                        <label>违章时间</label>
                        <input type="datetime-local" id="violationTime" required>
                    </div>
                    <div class="form-group">
                        <label>违章地点</label>
                        <input type="text" id="location" required placeholder="请输入违章地点">
                    </div>
                    <div class="form-group">
                        <label>罚款金额（元）</label>
                        <input type="number" id="fineAmount" required min="0" step="0.01" placeholder="请输入罚款金额">
                    </div>
                    <div class="form-group">
                        <label>扣分</label>
                        <input type="number" id="points" required min="0" max="12" placeholder="请输入扣分数值">
                    </div>
                    <button type="submit" class="btn btn-primary">录入违章</button>
                </form>
            </div>

            <div class="card">
                <h2>📋 所有违章记录</h2>
                <div id="allViolationsList"></div>
            </div>
        </div>

        <div id="ownerSection" class="hidden">
            <div class="user-info">
                <span id="ownerName"></span>
                <span id="ownerPlate"></span>
                <button onclick="logout()" class="btn btn-secondary">退出登录</button>
            </div>

            <div id="suspensionWarning" class="warning-card hidden">
                <h3>⚠️ 驾照暂扣通知</h3>
                <p>您的车辆累计扣分已达到12分，驾照已暂扣，禁止在线缴费，请线下处理！</p>
            </div>

            <div class="card">
                <div class="points-summary">
                    <span>累计扣分: <strong id="totalPoints">0</strong> 分</span>
                    <span class="points-bar">
                        <div id="pointsProgress" class="points-progress"></div>
                    </span>
                </div>
            </div>

            <div class="card">
                <h2>📋 我的违章记录</h2>
                <div id="myViolationsList"></div>
            </div>
        </div>

        <div id="receiptModal" class="modal hidden">
            <div class="modal-content">
                <span class="close" onclick="closeReceipt()">&times;</span>
                <div id="receiptContent" class="receipt"></div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
