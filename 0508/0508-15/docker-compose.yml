version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: delivery-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: delivery
      MYSQL_USER: delivery
      MYSQL_PASSWORD: delivery123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - delivery-network

  redis:
    image: redis:7-alpine
    container_name: delivery-redis
    ports:
      - "6379:6379"
    networks:
      - delivery-network

volumes:
  mysql-data:

networks:
  delivery-network:
    driver: bridge
