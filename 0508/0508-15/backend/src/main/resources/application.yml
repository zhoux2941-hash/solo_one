server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/delivery?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: delivery
    password: delivery123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

logging:
  level:
    com.delivery: DEBUG

rider:
  simulation:
    enabled: true
    interval-ms: 10000

distance:
  api:
    mock: true

risk:
  precompute:
    enabled: true
    interval-ms: 30000

dispatch:
  weight:
    distance: 0.45
    load: 0.30
    onTime: 0.25
  max-recommendations: 3
