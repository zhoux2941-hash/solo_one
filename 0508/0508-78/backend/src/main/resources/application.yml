server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/crew_notice?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0

jwt:
  secret: crew-notice-secret-key-for-jwt-token-very-secure
  expiration: 86400000

logging:
  level:
    com.crew: debug
