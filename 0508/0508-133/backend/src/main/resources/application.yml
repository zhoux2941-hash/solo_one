server:
  port: 8080

spring:
  application:
    name: iss-tracker
  datasource:
    url: jdbc:mysql://localhost:3306/iss_tracker?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0

logging:
  level:
    com.isstracker: DEBUG
