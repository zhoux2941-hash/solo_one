server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pool_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

cors:
  allowed-origins:
    - http://localhost:5173
    - http://localhost:3000
