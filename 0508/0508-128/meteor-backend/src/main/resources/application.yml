server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/meteor_spectra?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

file:
  upload:
    path: ./uploads

spectra:
  thumbnail:
    width: 200
    height: 150
  cache:
    thumbnail:
      ttl: 3600
