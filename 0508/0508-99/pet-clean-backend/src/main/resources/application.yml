server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pet_clean?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  cleaning:
    points-per-clean: 10
    remind-hours: 48
    cooldown-hours: 48

logging:
  level:
    com.petclean: DEBUG
