<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小说大纲管理器</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>小说大纲管理器</h2>
        <button id="btn-create-project" class="btn-primary">+ 新建项目</button>
      </div>
      <div id="tree-container" class="tree-container"></div>
    </div>
    <div class="main-content">
      <div id="view-tabs" class="view-tabs hidden">
        <button class="view-tab active" data-view="editor">📝 编辑视图</button>
        <button class="view-tab" data-view="timeline">📅 时间线视图</button>
      </div>
      <div id="editor-container" class="editor-container">
        <div class="welcome-message">
          <h1>欢迎使用小说大纲管理器</h1>
          <p>请在左侧创建或选择一个项目开始创作</p>
        </div>
      </div>
      <div id="timeline-container" class="timeline-container hidden"></div>
    </div>
  </div>

  <div id="modal-backdrop" class="modal-backdrop hidden">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">对话框</h3>
        <button id="modal-close" class="btn-close">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
      <div class="modal-footer">
        <button id="modal-cancel" class="btn-secondary">取消</button>
        <button id="modal-confirm" class="btn-primary">确定</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
