server:
  port: 8080

spring:
  application:
    name: popcorn-optimizer
  
  datasource:
    url: jdbc:mysql://localhost:3306/popcorn_optimizer?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

app:
  popcorn:
    total-machines: 3
    warmup-minutes: 15
    peak-start-hour: 19
    peak-end-hour: 21
    max-queue-length: 10
    service-rate-per-machine: 30
    warmup-power-kw: 2.0
    running-power-kw: 1.5
    electricity-price-per-kwh: 0.8
