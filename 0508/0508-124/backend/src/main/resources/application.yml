server:
  port: 8080

spring:
  application:
    name: light-pollution-map
  
  datasource:
    url: jdbc:mysql://localhost:3306/light_pollution?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

jwt:
  secret: light-pollution-map-secret-key-for-jwt-token-generation-2024
  expiration: 86400000

app:
  heatmap:
    cache-ttl: 300000
    grid-size: 100
    variogram-range: 0.5
    nugget: 0.1
    sill: 1.0
