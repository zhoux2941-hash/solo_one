server:
  port: 8080

spring:
  application:
    name: material-check

  datasource:
    url: jdbc:mysql://localhost:3306/factory_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms

  sql:
    init:
      mode: always
      encoding: UTF-8
